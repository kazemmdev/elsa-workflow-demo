services:
  postgres:
    image: postgres:18-alpine3.23
    container_name: elsa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: elsa
      POSTGRES_USER: elsa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    command: >
      -c max_connections=200
      -c shared_buffers=256MB
      -c log_min_duration_statement=1000
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elsa -d elsa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      elsa-net:

