  elsa-studio:
    image: elsaworkflows/elsa-studio-v3:latest
    pull_policy: always
    container_name: elsa-studio
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      HTTP_PORTS: 8080
      HTTP__BASEURL: http://localhost:3000
      ELSASERVER__URL: http://localhost:5000/elsa/api
    ports:
      - "3000:8080"
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      elsa-net:

