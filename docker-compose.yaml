services:
  postgres:
    image: postgres:18-alpine3.23
    container_name: elsa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: elsa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: elsa
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command: >
      -c max_connections=200
      -c shared_buffers=256MB
      -c log_min_duration_statement=1000
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elsa -d elsa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      elsa-net:

  elsa-server:
    image: elsaworkflows/elsa-server-v3:latest
    pull_policy: always
    container_name: elsa-server
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      HTTP_PORTS: 8080
      HTTP__BASEURL: http://localhost:12000
      DATABASEPROVIDER: PostgreSql
      CONNECTIONSTRINGS__POSTGRESQL: >-
        Server=postgres;
        Username=elsa;
        Database=elsa;
        Port=5432;
        Password=${POSTGRES_PASSWORD};
        SSLMode=Prefer;
        MaxPoolSize=100;
        Timeout=60
    ports:
      - "12000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      elsa-net:

  elsa-studio:
    image: elsaworkflows/elsa-studio-v3:latest
    pull_policy: always
    container_name: elsa-studio
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      HTTP_PORTS: 8080
      HTTP__BASEURL: http://localhost:13000
      ELSASERVER__URL: http://localhost:12000/elsa/api
    ports:
      - "13000:8080"
    depends_on:
      elsa-server:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      elsa-net:

volumes:
  postgres-data:
    driver: local

networks:
  elsa-net:
    driver: bridge
    name: elsa-network
